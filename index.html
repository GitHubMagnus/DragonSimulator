<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drachenflug — Mittelalter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud">
    <div class="readout"><span class="label">TEMPO</span><span id="speed">0</span><span class="unit">km/h</span></div>
    <div class="readout"><span class="label">HÖHE</span><span id="alt">0</span><span class="unit">m</span></div>
    <div class="readout"><span class="label" id="thrLabel">SCHLAG</span><span id="thr">0</span><span class="unit">%</span></div>
    <div class="readout"><span class="label">KURS</span><span id="hdg">N</span><span class="unit">&nbsp;</span></div>
  </div>

  <div id="menu">
    <div class="panel">
      <h1>🐉 Drachenflug</h1>
      <p class="sub">Königreich der Lüfte</p>

      <!-- Schritt 1: Fluggerät -->
      <div id="step-flier" class="step">
        <p class="lbl">Wähle dein Fluggerät</p>
        <div id="fliers"></div>
        <button id="toColorBtn">Weiter ▸</button>
      </div>

      <!-- Schritt 2: Farbe -->
      <div id="step-color" class="step hidden">
        <p class="lbl">Wähle die Farbe</p>
        <div id="colors"></div>
        <div class="actions">
          <button id="backBtn" class="ghost">◂ Zurück</button>
          <button id="startBtn">Flug beginnen ▸</button>
        </div>
      </div>

      <p class="hint"><b>W/S</b> neigen · <b>A/D</b> drehen · <b>Q/E</b> rollen · <b>↑/↓</b> Schub<span id="fireHint"> · <b>Leertaste</b> Feuer 🔥</span></p>
    </div>
  </div>

  <div id="crash">
    <h2>💥 Abgestürzt!</h2>
    <p>Drücke <b>R</b> für einen neuen Flug</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.183.0/build/three.webgpu.js",
      "three/webgpu": "https://unpkg.com/three@0.183.0/build/three.webgpu.js",
      "three/tsl": "https://unpkg.com/three@0.183.0/build/three.tsl.js",
      "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
