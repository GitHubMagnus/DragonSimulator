<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drachenflug — Mittelalter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud">
    <div class="readout"><span class="label">TEMPO</span><span id="speed">0</span><span class="unit">km/h</span></div>
    <div class="readout"><span class="label">HÖHE</span><span id="alt">0</span><span class="unit">m</span></div>
    <div class="readout"><span class="label">SCHLAG</span><span id="thr">0</span><span class="unit">%</span></div>
    <div class="readout"><span class="label">KURS</span><span id="hdg">N</span><span class="unit">&nbsp;</span></div>
  </div>

  <div id="menu">
    <div class="panel">
      <h1>🐉 Drachenflug</h1>
      <p class="sub">Königreich der Lüfte</p>
      <p class="lbl">Wähle deinen Drachen</p>
      <div id="colors"></div>
      <button id="startBtn">Flug beginnen ▸</button>
      <p class="hint"><b>W/S</b> neigen · <b>A/D</b> drehen · <b>Q/E</b> rollen · <b>↑/↓</b> Schub · <b>Leertaste</b> Feuer 🔥</p>
    </div>
  </div>

  <div id="crash">
    <h2>💥 Abgestürzt!</h2>
    <p>Drücke <b>R</b> für einen neuen Flug</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
